name: Build and deploy Foundry Agent WebApp to Azure - PDC-Ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Debug Variables
        run: |
          echo "Tenant=${{ vars.VITE_ENTRA_TENANT_ID }}"
          echo "SPA=${{ vars.VITE_ENTRA_SPA_CLIENT_ID }}"
          echo "Backend=${{ vars.VITE_ENTRA_BACKEND_CLIENT_ID }}"

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_ENTRA_SPA_CLIENT_ID: ${{ vars.VITE_ENTRA_SPA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_BACKEND_CLIENT_ID: ${{ vars.VITE_ENTRA_BACKEND_CLIENT_ID }}
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend
        run: dotnet restore backend/WebApp.Api/WebApp.Api.csproj

      - name: Publish backend
        run: dotnet publish backend/WebApp.Api/WebApp.Api.csproj -c Release -o publish

      - name: Copy frontend build to backend wwwroot
        run: |
          mkdir -p publish/wwwroot
          cp -r frontend/dist/* publish/wwwroot/

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B5700EF2774602ACF59386A2E9481A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2CACA7B093954DD08D8FA0073470F6B1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CCF3375069C543FDB2DF214EBEBCE6F2 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: PDC-Ai-App
          package: .
