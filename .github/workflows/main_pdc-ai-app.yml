name: Build and deploy ASP.Net Core app to Azure Web App - PDC-Ai-App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build backend/WebApp.Api/WebApp.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish backend/WebApp.Api/WebApp.Api.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_526D2C8C7F584A8B82640ECC53BA634E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD8902B126AD4ED5A6F514049035474D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3C4048FCFE1041A3B1AEC76A12B5DD92 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PDC-Ai-App'
          slot-name: 'Production'
          package: .
          
