name: Build and deploy Foundry Agent WebApp to Azure - PDC-Ai-App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend to backend wwwroot
        shell: pwsh
        run: |
          if (Test-Path "backend/WebApp.Api/wwwroot") {
            Remove-Item "backend/WebApp.Api/wwwroot" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "backend/WebApp.Api/wwwroot"
          Copy-Item "frontend/dist/*" "backend/WebApp.Api/wwwroot" -Recurse -Force

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        run: dotnet build backend/WebApp.Api/WebApp.Api.csproj --configuration Release

      - name: Publish backend with frontend
        run: dotnet publish backend/WebApp.Api/WebApp.Api.csproj -c Release -o "${{ github.workspace }}/publish"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-webapp
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: foundry-webapp
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B5700EF2774602ACF59386A2E9481A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2CACA7B093954DD08D8FA0073470F6B1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CCF3375069C543FDB2DF214EBEBCE6F2 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: PDC-Ai-App
          package: ./publish
